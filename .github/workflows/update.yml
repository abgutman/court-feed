name: Update court feed

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch court data
        run: python fetch.py

      - name: Build static site
        run: python build_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "court-feed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ site/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update court feed — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
