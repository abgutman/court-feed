name: Update court feed

on:
  schedule:
    # :17 keeps us off the congested top-of-the-hour slot, where GitHub
    # skips/delays schedules and runner acquisition fails most often
    - cron: '17 * * * *'
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright PyPDF2
          playwright install chromium --with-deps

      - name: Fetch court data
        run: python fetch.py

      - name: Fetch calendar data
        run: python fetch_calendar.py

      - name: Build static site
        run: |
          python build_site.py
          python build_calendar.py

      - name: Commit and push if changed
        run: |
          git config user.name "court-feed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ site/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update court feed — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v5
