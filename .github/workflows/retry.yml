name: Retry failed runs

# Auto-retries transient GitHub-side failures (runner never acquired,
# "Deployment failed, try again later" from deploy-pages). Fires when a
# watched workflow completes with conclusion=failure; re-runs only the
# failed jobs. run_attempt < 3 caps this at 2 automatic retries so a
# genuine breakage can't loop forever.

on:
  workflow_run:
    workflows: ["Update court feed"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait out the blip, then re-run failed jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          echo "Retrying run $RUN_ID (failed attempt $ATTEMPT)"
          sleep 90
          curl -sS -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/rerun-failed-jobs" \
            -w "\nHTTP %{http_code}\n"
